[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
lib_deps =
  bogde/HX711 @ ^0.7.5
  knolleary/PubSubClient @ ^2.8
  ESP32Async/AsyncTCP @ ^3.4.8
  ESP32Async/ESPAsyncWebServer @ ^3.8.1
  khoih-prog/ESPAsync_WiFiManager @ ^1.15.0
build_flags =
  -DCORE_DEBUG_LEVEL=3
